<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3; url=docs/index.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMM-Arena — Entering the Compendium</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #060a14;
            --bg-mid: #0c1222;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-600: #1d5ede;
            --blue-700: #1e40af;
            --violet-500: #8b5cf6;
            --white: #f1f5f9;
            --gray-400: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--white);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Background Grid ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
        }

        /* ── Aurora Orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: orbFadeIn 1.2s ease-out forwards;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(29,94,222,.25), transparent 70%);
            top: -15%; left: -10%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,.2), transparent 70%);
            bottom: -15%; right: -8%;
            animation-delay: .2s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,.15), transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: .4s;
        }

        @keyframes orbFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── Floating Particles ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: var(--size);
            height: var(--size);
            background: var(--blue-400);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat var(--duration) var(--delay) ease-in-out infinite;
        }
        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            15% { opacity: var(--max-opacity); }
            85% { opacity: var(--max-opacity); }
            100% { opacity: 0; transform: translateY(var(--dy)) translateX(var(--dx)) scale(0.2); }
        }

        /* ── Main Container ── */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── Logo with Glow Ring ── */
        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
            opacity: 0;
            animation: logoEntrance .8s cubic-bezier(.16,1,.3,1) .1s forwards;
        }
        .logo-glow {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                rgba(59,130,246,.4),
                rgba(139,92,246,.3),
                rgba(59,130,246,.1),
                rgba(139,92,246,.4),
                rgba(59,130,246,.4)
            );
            animation: glowSpin 3s linear infinite;
            filter: blur(2px);
        }
        .logo-glow-inner {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--bg-deep);
        }
        .logo-img {
            position: relative;
            z-index: 2;
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 0 30px rgba(59,130,246,.3));
        }

        @keyframes logoEntrance {
            from { opacity: 0; transform: scale(0.6) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes glowSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ── Progress Ring (SVG) ── */
        .progress-ring-wrapper {
            position: absolute;
            inset: -16px;
            z-index: 3;
        }
        .progress-ring {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .progress-ring-bg {
            fill: none;
            stroke: rgba(255,255,255,.06);
            stroke-width: 2;
        }
        .progress-ring-fill {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 478;
            stroke-dashoffset: 478;
            animation: ringProgress 2.2s cubic-bezier(.4,0,.2,1) .3s forwards;
        }

        @keyframes ringProgress {
            to { stroke-dashoffset: 0; }
        }

        /* ── Title ── */
        .title {
            font-size: 2.4rem;
            font-weight: 850;
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 12px;
            opacity: 0;
            animation: textSlideUp .7s cubic-bezier(.16,1,.3,1) .3s forwards;
        }
        .title .accent {
            background: linear-gradient(135deg, var(--blue-400), var(--violet-500));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Subtitle ── */
        .subtitle {
            font-size: .92rem;
            color: var(--gray-400);
            font-weight: 400;
            letter-spacing: .02em;
            margin-bottom: 36px;
            opacity: 0;
            animation: textSlideUp .7s cubic-bezier(.16,1,.3,1) .5s forwards;
        }

        @keyframes textSlideUp {
            from { opacity: 0; transform: translateY(16px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* ── Progress Bar ── */
        .progress-track {
            width: 240px;
            height: 3px;
            background: rgba(255,255,255,.06);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
            opacity: 0;
            animation: textSlideUp .5s cubic-bezier(.16,1,.3,1) .6s forwards;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--blue-500), var(--violet-500));
            box-shadow: 0 0 12px rgba(59,130,246,.4), 0 0 4px rgba(139,92,246,.3);
            animation: progressFill 2s cubic-bezier(.4,0,.2,1) .5s forwards;
        }

        @keyframes progressFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ── Loading Text ── */
        .loading-text {
            font-size: .78rem;
            color: rgba(148,163,184,.6);
            letter-spacing: .06em;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0;
            animation: textSlideUp .5s cubic-bezier(.16,1,.3,1) .7s forwards;
        }
        .loading-text span {
            display: inline-block;
        }
        .dot-1 { animation: dotPulse 1.4s ease-in-out .8s infinite; }
        .dot-2 { animation: dotPulse 1.4s ease-in-out 1s infinite; }
        .dot-3 { animation: dotPulse 1.4s ease-in-out 1.2s infinite; }

        @keyframes dotPulse {
            0%, 100% { opacity: .3; }
            50% { opacity: 1; }
        }

        /* ── Stats Row ── */
        .stats-row {
            display: flex;
            gap: 28px;
            margin-top: 44px;
            opacity: 0;
            animation: textSlideUp .6s cubic-bezier(.16,1,.3,1) .9s forwards;
        }
        .stat-item {
            text-align: center;
        }
        .stat-num {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--blue-400);
            line-height: 1;
        }
        .stat-label {
            font-size: .62rem;
            color: rgba(148,163,184,.5);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-top: 4px;
            font-weight: 500;
        }

        /* ── Exit Animation ── */
        .exit-active .container {
            animation: exitUp .5s cubic-bezier(.6,.05,.01,.99) forwards;
        }
        .exit-active .orb { animation: orbExit .6s ease-in forwards; }
        .exit-active .bg-grid { animation: fadeOut .4s ease forwards; }

        @keyframes exitUp {
            to { opacity: 0; transform: translateY(-40px) scale(0.96); filter: blur(6px); }
        }
        @keyframes orbExit {
            to { opacity: 0; transform: scale(1.3); }
        }
        @keyframes fadeOut {
            to { opacity: 0; }
        }

        /* ── Fallback Link ── */
        .fallback {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            opacity: 0;
            animation: textSlideUp .5s ease 1.5s forwards;
        }
        .fallback a {
            color: rgba(148,163,184,.4);
            text-decoration: none;
            font-size: .72rem;
            letter-spacing: .03em;
            transition: color .2s;
        }
        .fallback a:hover { color: var(--blue-400); }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .logo-wrapper { width: 90px; height: 90px; margin-bottom: 24px; }
            .logo-img { width: 90px; height: 90px; }
            .logo-glow { inset: -10px; }
            .progress-ring-wrapper { inset: -14px; }
            .title { font-size: 1.8rem; }
            .subtitle { font-size: .82rem; }
            .stats-row { gap: 18px; margin-top: 32px; }
            .stat-num { font-size: 1.1rem; }
            .progress-track { width: 180px; }
        }

        /* ── Prefers Reduced Motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-delay: 0ms !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="docs/logo.png">
</head>
<body>

    <!-- Background -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Logo with Progress Ring -->
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <div class="logo-glow-inner"></div>
            <img src="docs/logo.png" alt="OpenMM-Arena" class="logo-img">
            <div class="progress-ring-wrapper">
                <svg class="progress-ring" viewBox="0 0 152 152">
                    <defs>
                        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="50%" stop-color="#8b5cf6" />
                            <stop offset="100%" stop-color="#3b82f6" />
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring-bg" cx="76" cy="76" r="74" />
                    <circle class="progress-ring-fill" cx="76" cy="76" r="74" />
                </svg>
            </div>
        </div>

        <!-- Text -->
        <div class="title">Open<span class="accent">MM</span>-Arena</div>
        <div class="subtitle">A Comprehensive Compendium for Multimodal AI Research</div>

        <!-- Progress Bar -->
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>

        <!-- Loading indicator -->
        <div class="loading-text">
            Entering the compendium<span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span>
        </div>

        <!-- Stats teaser -->
        <div class="stats-row">
            <div class="stat-item"><div class="stat-num">2000+</div><div class="stat-label">Papers</div></div>
            <div class="stat-item"><div class="stat-num">7</div><div class="stat-label">Pillars</div></div>
            <div class="stat-item"><div class="stat-num">46</div><div class="stat-label">Models</div></div>
            <div class="stat-item"><div class="stat-num">100+</div><div class="stat-label">Benchmarks</div></div>
        </div>
    </div>

    <!-- Fallback -->
    <div class="fallback">
        <a href="docs/index.html">Click here if not redirected automatically</a>
    </div>

    <script>
    (function() {
        'use strict';

        /* ── Generate Particles ── */
        var particlesEl = document.getElementById('particles');
        if (particlesEl && window.innerWidth > 480) {
            for (var i = 0; i < 24; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var size = 1.5 + Math.random() * 3;
                p.style.setProperty('--size', size + 'px');
                p.style.setProperty('--duration', (8 + Math.random() * 12) + 's');
                p.style.setProperty('--delay', (-Math.random() * 8) + 's');
                p.style.setProperty('--dx', (-30 + Math.random() * 60) + 'px');
                p.style.setProperty('--dy', (-80 + Math.random() * -20) + 'px');
                p.style.setProperty('--max-opacity', (0.15 + Math.random() * 0.35).toString());
                p.style.left = (Math.random() * 100) + '%';
                p.style.top = (20 + Math.random() * 60) + '%';
                particlesEl.appendChild(p);
            }
        }

        /* ── Animated Stat Counters ── */
        var statNums = document.querySelectorAll('.stat-num');
        function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

        setTimeout(function() {
            statNums.forEach(function(el) {
                var text = el.textContent.trim();
                var match = text.match(/^(\d+)(.*)/);
                if (!match) return;
                var target = parseInt(match[1]);
                var suffix = match[2];
                var duration = 1600;
                var start = null;
                function step(ts) {
                    if (!start) start = ts;
                    var progress = Math.min((ts - start) / duration, 1);
                    el.textContent = Math.round(target * easeOutExpo(progress)) + suffix;
                    if (progress < 1) requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            });
        }, 1000);

        /* ── Redirect with Exit Animation ── */
        setTimeout(function() {
            document.body.classList.add('exit-active');
            setTimeout(function() {
                window.location.replace('docs/index.html');
            }, 500);
        }, 2500);
    })();
    </script>
</body>
</html>
